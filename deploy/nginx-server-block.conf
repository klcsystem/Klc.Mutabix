# mutabix.klcsystem.com — trustgate-nginx'e eklenecek server block
# Dosya: /opt/trustgate/deploy/nginx/nginx.conf icine ekle

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name mutabix.klcsystem.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS
server {
    listen 443 ssl;
    server_name mutabix.klcsystem.com;

    ssl_certificate /etc/letsencrypt/live/mutabix.klcsystem.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mutabix.klcsystem.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # API proxy
    location /api/ {
        set $u mutabix-api:8080;
        proxy_pass http://$u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
        client_max_body_size 50M;
    }

    # Frontend (SPA)
    location / {
        set $u mutabix-web:80;
        proxy_pass http://$u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
